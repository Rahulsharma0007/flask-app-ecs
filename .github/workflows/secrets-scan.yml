name: secrets-scan

on:
    workflow_dispatch:

jobs:
    secrets-scan:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4
              with: 
               fetch-depth: 0 

            - name: Detect secrets with Gitleaks
              uses: gitleaks/gitleaks-action@v2
              env:
                 GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}