name: deploy-to-server

on:
    workflow_call:

jobs:
    deploy-to-server:
        runs-on: ubuntu-latest
        steps:
             - name: Remote SSH
               uses: appleboy/ssh-action@v1.0.3
               with:
                    host: ${{ secrets.EC2_SSH_HOST }}
                    username: ${{ secrets.EC2_SSH_USER }}
                    key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
                    script: |
                     echo " Project will work"
                     mkdir -p Devops


        